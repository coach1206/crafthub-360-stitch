            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;

        .glass-obsidian {
            background: rgba(19, 19, 19, 0.8);
            backdrop-filter: blur(40px);

            border: 1px solid rgba(255, 255, 255, 0.15);

        .gold-foil-glow {
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.15);
        }
        .shimmer-effect {
            position: relative;
            overflow: hidden;
        }
        .shimmer-effect::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            transform: rotate(45deg);
            animation: shimmer 6s infinite;
        }
        @keyframes shimmer {
            0% { transform: translateX(-100%) rotate(45deg); }
            100% { transform: translateX(100%) rotate(45deg); }
        }
        .haptic-pulse:active {
            transform: scale(0.95);
            transition: transform 0.1s cubic-bezier(0.4, 0, 0.2, 1);
        }
    </style>

<!-- Lightweight Background Animation -->
<script>
        document.addEventListener('mousemove', (e) => {
            const moveX = (e.clientX - window.innerWidth / 2) * 0.005;
            const moveY = (e.clientY - window.innerHeight / 2) * 0.005;
            document.querySelector('.scale-105').style.transform = `translate(${moveX}px, ${moveY}px) scale(1.05)`;
        });

        // Basic haptic feedback simulation on button clicks
        document.querySelectorAll('.haptic-pulse').forEach(button => {
            button.addEventListener('click', () => {
                if (window.navigator.vibrate) {
                    window.navigator.vibrate(10);
                }
            });
        });
    </script>
