<p class="font-body-md text-body-md text-on-surface-variant">Exceptional value, approachable flavor profiles for daily enjoyment.</p>
</button>

<div class="absolute top-0 right-0 p-4 opacity-10 group-hover:opacity-20 transition-opacity">
<span class="material-symbols-outlined text-6xl">stars</span>
</div>
<span class="font-label-sm text-label-sm text-primary mb-2 uppercase tracking-widest">Reserve Tier</span>

</button>
<!-- Option 4 -->

</div>
<div class="relative z-10">
<span class="inline-block px-3 py-1 bg-primary text-on-primary font-label-sm text-label-sm rounded-full mb-4 uppercase tracking-tighter">Recommended</span>

</button>

<script>
        // Micro-interactions for buttons
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('mousedown', () => {
                btn.style.transform = 'scale(0.96)';
            });
            btn.addEventListener('mouseup', () => {
                btn.style.transform = 'scale(1.02)';
            });
            btn.addEventListener('mouseleave', () => {
                btn.style.transform = 'scale(1)';
            });
        });
    </script>
