<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            line-height: 1;
        }

        .leather-texture {
            background-color: #131314;
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(233, 193, 118, 0.03) 0%, transparent 100%),
                url("https://www.transparenttextures.com/patterns/black-leather.png");
            background-attachment: fixed;
        }

        .gold-foil {
            background: linear-gradient(135deg, #e9c176 0%, #c5a059 50%, #775a19 100%);
            box-shadow: 0 4px 15px rgba(233, 193, 118, 0.4), inset 0 1px 1px rgba(255, 255, 255, 0.3);
            text-shadow: 0 1px 2px rgba(0,0,0,0.2);
        }

        .glass-morphism {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(233, 193, 118, 0.2);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .industrial-steel {
            background: linear-gradient(180deg, #54433e 0%, #3c2d28 100%);
            border: 2px solid #b7a09a;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.5), 0 4px 8px rgba(0,0,0,0.3);
            color: #dac1bb;
        }

        .haptic-pulse:active {
            transform: scale(0.97);
            filter: brightness(0.9);
            transition: all 0.1s ease-out;
        }

        .ambient-glow {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background: radial-gradient(circle at center, rgba(233, 193, 118, 0.1) 0%, transparent 70%);
            z-index: -1;
        }

        @keyframes subtle-float {
            0% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0); }
        }
        
        .floating {
            animation: subtle-float 6s ease-in-out infinite;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);

<body class="leather-texture text-on-surface min-h-screen flex flex-col overflow-hidden">

</div>
<div class="w-12 h-12 rounded-full border-2 border-primary/50 overflow-hidden bg-surface-container-high">

</div>
</div>
</div>
</header>
<!-- Main Content Area -->

<div class="ambient-glow"></div>

<!-- Interactive script for ambient mouse-move effect -->
<script>
        document.addEventListener('mousemove', (e) => {
            const glow = document.querySelector('.ambient-glow');
            const x = e.clientX;
            const y = e.clientY;
            glow.style.background = `radial-gradient(circle at ${x}px ${y}px, rgba(233, 193, 118, 0.08) 0%, transparent 50%)`;
        });

        // Simulating haptic feedback visual pulse on tap
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('click', function() {
                this.classList.add('scale-95');
                setTimeout(() => this.classList.remove('scale-95'), 100);
            });
        });
    </script>
