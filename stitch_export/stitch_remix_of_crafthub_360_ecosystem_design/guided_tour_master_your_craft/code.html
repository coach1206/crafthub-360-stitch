<script>
        // Micro-interaction: Module selection simulation
        const modules = document.querySelectorAll('.grid button');
        modules.forEach(btn => {
            btn.addEventListener('click', () => {
                // Clear active states

                // Set active state
                btn.classList.add('bg-surface-container-highest', 'border-primary/40');
