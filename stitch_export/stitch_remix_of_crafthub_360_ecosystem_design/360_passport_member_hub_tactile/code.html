<script>
        function simulateAction(message) {
            const toast = document.getElementById('toast');
            toast.innerText = message;
            toast.classList.remove('opacity-0', 'translate-y-4', 'pointer-events-none');
            toast.classList.add('opacity-100', 'translate-y-0');
            
            // Haptic/Tactile feedback simulation
            if (window.navigator && window.navigator.vibrate) {
                window.navigator.vibrate(20);
            }

            setTimeout(() => {
                toast.classList.add('opacity-0', 'translate-y-4', 'pointer-events-none');
                toast.classList.remove('opacity-100', 'translate-y-0');
            }, 2500);
        }

        // Add subtle mouse-parallax effect for kiosks with mouse/trackball
        document.addEventListener('mousemove', (e) => {
            const moveX = (e.clientX - window.innerWidth / 2) * 0.005;
            const moveY = (e.clientY - window.innerHeight / 2) * 0.005;
            document.querySelectorAll('.tile-active').forEach(tile => {
                tile.style.transform = `translate(${moveX}px, ${moveY}px)`;
            });
        });
    </script>
