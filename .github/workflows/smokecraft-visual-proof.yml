name: SmokeCraft Visual Proof

on:
  pull_request:
    paths:
      - 'src/pages/SmokeCraft.jsx'
      - 'src/pages/smokecraft/**'
      - 'src/components/smokecraft/**'
      - 'src/styles.css'
      - 'public/assets/smokecraft/**'
      - 'public/*SmokeCraft*'
      - 'public/*SMOKE*'
      - 'public/*SEED*'
      - 'public/*SHAPE*'
      - 'public/*GOLDEN*'
      - 'public/*LOUNGE*'

jobs:
  visual-proof:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run SmokeCraft visual proof
        run: npm run visual:smokecraft

      - name: Upload visual proof artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smokecraft-visual-proof
          path: docs/visual-proof/
          if-no-files-found: warn
