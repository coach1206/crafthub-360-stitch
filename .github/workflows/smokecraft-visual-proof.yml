name: MVP2 Visual Proof

on:
  pull_request:
    paths:
      - 'src/pages/SmokeCraft.jsx'
      - 'src/pages/smokecraft/**'
      - 'src/components/smokecraft/**'
      - 'src/pages/pos3/**'
      - 'src/components/pos3/**'
      - 'src/pages/eat/**'
      - 'src/components/eat/**'
      - 'src/pages/passport/**'
      - 'src/components/passport/**'
      - 'src/pages/dayone360/**'
      - 'src/components/dayone360/**'
      - 'src/pages/crafthub/**'
      - 'src/components/crafthub/**'
      - 'src/styles.css'
      - 'public/assets/smokecraft/**'
      - 'public/*SmokeCraft*'
      - 'public/*SMOKE*'
      - 'public/*SEED*'
      - 'public/*SHAPE*'
      - 'public/*GOLDEN*'
      - 'public/*LOUNGE*'
      - 'public/*PASSPORT*'
      - 'public/*Passport*'
      - 'public/*DAYONE360*'
      - 'public/*CRAFT HUB*'
      - 'public/*POS*'
      - 'public/*EAT*'
      - 'scripts/visualProof.js'
      - 'scripts/smokecraftVisualProof.js'

jobs:
  visual-proof:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run MVP2 visual proof (all families)
        run: npm run visual:all

      - name: Upload visual proof artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mvp2-visual-proof
          path: docs/visual-proof/
          if-no-files-found: warn

      - name: Diagnostic - list lingering processes
        if: always()
        run: ps aux | grep -E "vite|node|chrome|chromium" || true
